<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f3f5f8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="予算ポケット">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="stylesheet" href="styles.css?v=2">
  <title>予算ポケット</title>
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">BUDGET POCKET</p>
      <h1>予算</h1>
    </div>
    <div class="header-actions">
      <button class="sync-button" id="syncButton" type="button">ローカル</button>
      <button class="icon-button" id="installHelpButton" aria-label="ホーム画面への追加方法">↗</button>
    </div>
  </header>

  <main>
    <section class="month-switcher" aria-label="表示する月">
      <button id="previousMonth" aria-label="前の月">‹</button>
      <button id="currentMonth" class="month-label"></button>
      <button id="nextMonth" aria-label="次の月">›</button>
    </section>

    <section class="summary-card card">
      <div class="section-heading">
        <span>残りの予算</span>
        <button class="text-button" id="editBudgetButton">予算を設定</button>
      </div>
      <p class="remaining" id="remainingAmount">¥0</p>
      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      <div class="summary-meta">
        <span>使用済み <strong id="spentAmount">¥0</strong></span>
        <span>予算 <strong id="budgetAmount">¥0</strong></span>
      </div>
    </section>

    <section class="card category-card" id="categoryCard" hidden>
      <div class="section-heading"><h2>カテゴリ別</h2></div>
      <div class="category-overview">
        <div class="donut" id="categoryDonut"><span id="donutTotal">¥0</span></div>
        <div class="category-legend" id="categoryLegend"></div>
      </div>
      <div class="category-list" id="categoryList"></div>
    </section>

    <section class="card history-card">
      <div class="section-heading">
        <h2>支出履歴</h2>
        <span class="count" id="expenseCount">0件</span>
      </div>
      <div id="expenseList"></div>
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">⌁</div>
        <strong>支出はまだありません</strong>
        <span>下のボタンから入力できます</span>
      </div>
    </section>
  </main>

  <button class="add-button" id="addExpenseButton"><span>＋</span> 支出を入力</button>

  <dialog id="expenseDialog">
    <form id="expenseForm">
      <div class="dialog-header">
        <button type="button" class="text-button" data-close="expenseDialog">キャンセル</button>
        <h2>支出を追加</h2>
        <button type="submit" class="text-button strong">保存</button>
      </div>
      <label>金額<input id="expenseAmount" type="number" min="1" step="1" inputmode="numeric" placeholder="0" required></label>
      <label>カテゴリ<select id="expenseCategory"></select></label>
      <label>日付<input id="expenseDate" type="date" required></label>
      <label>メモ（任意）<input id="expenseNote" maxlength="80" placeholder="例：スーパー"></label>
    </form>
  </dialog>

  <dialog id="budgetDialog">
    <form id="budgetForm">
      <div class="dialog-header">
        <button type="button" class="text-button" data-close="budgetDialog">キャンセル</button>
        <h2>予算を設定</h2>
        <button type="submit" class="text-button strong">保存</button>
      </div>
      <p class="dialog-month" id="budgetDialogMonth"></p>
      <label>月の予算<input id="budgetInput" type="number" min="0" step="1" inputmode="numeric" placeholder="100000" required></label>
    </form>
  </dialog>

  <dialog id="installDialog">
    <div class="info-dialog">
      <div class="dialog-header">
        <span></span><h2>ホーム画面に追加</h2><button type="button" class="close-circle" data-close="installDialog">×</button>
      </div>
      <ol>
        <li>Safari下部の共有ボタン <strong>□↑</strong> をタップ</li>
        <li>「ホーム画面に追加」を選択</li>
        <li>右上の「追加」をタップ</li>
      </ol>
      <p>追加後は通常のアプリのように開け、オフラインでも利用できます。</p>
    </div>
  </dialog>

  <script type="module" src="app.js?v=5"></script>
</body>
</html>
